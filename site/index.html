<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="以有限的视野，体验祂所经历的片刻。" />
    <title>耶稣模拟器</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main class="simulator">
      <section class="experience-card" aria-labelledby="simulator-title">
        <div class="card-copy">
          <p class="eyebrow" aria-hidden="true">THE WAY · THE TRUTH · THE LIFE</p>
          <h1 id="simulator-title">耶稣模拟器</h1>
          <div class="divider" aria-hidden="true"></div>
          <p class="status-text" aria-live="polite">你该知晓祂所经历…</p>
          <p class="scripture">——神人福音 67：67</p>
        </div>

        <button class="experience-button" type="button" aria-pressed="false">
          开始模拟
        </button>
      </section>

      <div class="vision-overlay" aria-hidden="true"></div>
      <p class="escape-hint" aria-hidden="true">按 Esc 也可结束体验</p>
    </main>
  </body>
</html>
